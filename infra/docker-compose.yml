version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ../backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../backend/.env:/app/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ..
      dockerfile: workers/Dockerfile
    volumes:
      - ..:/app
      - ../backend/.env:/app/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A workers.celery_worker.celery_app worker --loglevel=info

volumes:
  redis_data:
